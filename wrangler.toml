#:schema node_modules/wrangler/config-schema.json
name = "discovery-x"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "discovery-x-db"
database_id = "1bab6138-6b2f-45eb-8285-55ba7b543957"
migrations_dir = "drizzle"

# Cron Triggers (daily notification at 9:00 AM KST = 0:00 UTC)
# Note: Cron triggers require Workers, not Pages.
# For Pages, use an external cron service to call /api/cron/daily?secret=<CRON_SECRET>
# [triggers]
# crons = ["0 0 * * *"]

# Environment variables (set via Cloudflare dashboard or wrangler secret)
# RESEND_API_KEY = "re_xxxxx" (set via: wrangler secret put RESEND_API_KEY)
# CRON_SECRET = "xxxxx" (set via: wrangler secret put CRON_SECRET)
# SESSION_SECRET = "xxxxx" (set via: wrangler secret put SESSION_SECRET)
# ANTHROPIC_API_KEY = "sk-ant-xxxxx" (set via: wrangler secret put ANTHROPIC_API_KEY)
