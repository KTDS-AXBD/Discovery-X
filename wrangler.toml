#:schema node_modules/wrangler/config-schema.json
name = "discovery-x"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "discovery-x-db"
database_id = "1bab6138-6b2f-45eb-8285-55ba7b543957"
migrations_dir = "drizzle"

# Cron Triggers (daily notification at 9:00 AM KST = 0:00 UTC)
# Note: Cron triggers require Workers, not Pages.
# For Pages, use an external cron service to call /api/cron/daily?secret=<CRON_SECRET>
# [triggers]
# crons = ["0 0 * * *"]

# Vectorize (semantic search)
# Create indexes:
#   wrangler vectorize create dx-discovery-embeddings --dimensions=1536 --metric=cosine
#   wrangler vectorize create dx-evidence-embeddings --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_DISCOVERIES"
index_name = "dx-discovery-embeddings"

[[vectorize]]
binding = "VECTORIZE_EVIDENCE"
index_name = "dx-evidence-embeddings"

#   wrangler vectorize create dx-radar-embeddings --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_RADAR"
index_name = "dx-radar-embeddings"

#   wrangler vectorize create dx-graph-embeddings --dimensions=512 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_GRAPHS"
index_name = "dx-graph-embeddings"

#   wrangler vectorize create dx-memory-embeddings --dimensions=512 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_MEMORY"
index_name = "dx-memory-embeddings"

#   wrangler vectorize create dx-signal-embeddings --dimensions=512 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_SIGNALS"
index_name = "dx-signal-embeddings"

# Environment variables (set via Cloudflare dashboard or wrangler secret)
# RESEND_API_KEY = "re_xxxxx" (set via: wrangler secret put RESEND_API_KEY)
# CRON_SECRET = "xxxxx" (set via: wrangler secret put CRON_SECRET)
# SESSION_SECRET = "xxxxx" (set via: wrangler secret put SESSION_SECRET)
# ANTHROPIC_API_KEY = "sk-ant-xxxxx" (set via: wrangler secret put ANTHROPIC_API_KEY)
# GOOGLE_CLIENT_ID = "xxxxx.apps.googleusercontent.com" (set via: wrangler secret put GOOGLE_CLIENT_ID)
# GOOGLE_CLIENT_SECRET = "xxxxx" (set via: wrangler secret put GOOGLE_CLIENT_SECRET)

# Feature Flags (v3 Architecture Upgrade)
# Phase 5 갭 해소 완료 후 true 전환 준비 완료
# 프로덕션 배포 시 단계적 활성화 (graph → acl → topic → memory → agent → vectorize)
[vars]
FF_GRAPH_LAYER = "true"
FF_AGENT_DO = "true"
AGENT_WORKER_URL = "https://agent-worker.dx.minu.best"
FF_TOPIC_COLLAB = "true"
FF_ACL_SCOPE = "true"
FF_MEMORY_LIFECYCLE = "true"
FF_VECTORIZE_SEARCH = "true"
FF_PIPELINE_BRIDGE = "true"
FF_COLLAB_WORKER = "true"      # collab-worker 프로덕션 활성화
FF_PROFILE_LEARNER = "true"
FF_SIMPLIFIED_NAV = "true"       # 온보딩 모드: GNB를 대시보드+아이디어만 노출
FF_AI_FALLBACK = "true"          # AI 프로바이더 자동 전환 (Anthropic→OpenAI→Google→Workers AI)
CF_ACCOUNT_ID = "02ae9a2bead25d99caa8f3258b81f568"  # Workers AI REST API용
FF_REQUIREMENTS_AGENT = "true"   # 요구사항 AI 검토 Agent + 5칸반 칸반
