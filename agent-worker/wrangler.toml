#:schema node_modules/wrangler/config-schema.json
name = "agent-worker"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

# Durable Object 바인딩
[durable_objects]
bindings = [
  { name = "AGENT_SESSION", class_name = "AgentSessionDO" }
]

# DO 마이그레이션 (최초 배포 시 필요)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentSessionDO"]

# D1 데이터베이스 바인딩 (메인 앱과 동일 DB 공유)
[[d1_databases]]
binding = "DB"
database_name = "discovery-x-db"
database_id = "86590201-0a3f-4ce4-8021-c3d32e0a44eb"

# 커스텀 도메인: Cloudflare Dashboard Workers > agent-worker > Settings > Domains 에서 수동 설정
# pattern: agent-worker.dx.minu.best

[vars]
# Feature Flag 참조 — 메인 앱과 동일
FF_AGENT_DO = "true"

# Secrets (Cloudflare Dashboard 또는 GitHub Actions에서 설정):
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put SESSION_SECRET
